<div class="m-2 bg-white rounded-lg shadow-md flex flex-col items-center justify-center h-[85dvh]">
  <div class="w-full flex justify-start p-2">
    <button type="button" class="px-2 py-2 rounded-lg
      hover:bg-green-500 bg-green-600 text-white flex items-center hover:scale-101
      justify-center shadow-md hover:shadow-lg hover:shadow-green-500/20 transition duration-200 ease-in-out
      cursor-pointer focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-offset-2
      text-md font-semibold">
      <mat-icon class="">add</mat-icon>
      Adicionar tarefa
    </button>
  </div>
  <form class="flex flex-row gap-2 w-full h-full p-1">
    @for(status of statusTarefas; track $index) {
    <div (drop)="onDrop($event, status)" (dragover)="onDragOver($event)" (dragleave)="onDragLeave()" class="flex-1 flex flex-col rounded-lg p-4 border-2
                transition duration-200 ease-in-out" [ngClass]="{
                  'bg-blue-50 border-blue-300': status === 'PENDENTE',
                  'bg-yellow-50 border-yellow-300': status === 'EM_ANDAMENTO',
                  'bg-green-50 border-green-300': status === 'CONCLUIDA',


                }">

      <div class="flex items-center justify-between mb-4 pb-2 border-b" [ngClass]="{
          'border-blue-300': status === 'PENDENTE',
          'border-yellow-300': status === 'EM_ANDAMENTO',
          'border-green-300': status === 'CONCLUIDA'
        }">
        <h2 class="text-lg font-semibold" [ngClass]="{
          'text-blue-900': status === 'PENDENTE',
          'text-yellow-900': status === 'EM_ANDAMENTO',
          'text-green-900': status === 'CONCLUIDA'
        }">{{ status }}</h2>
        <span class="text-xs px-2 py-0.5 rounded-full" [ngClass]="{
          'bg-blue-200': status === 'PENDENTE',
          'bg-yellow-200': status === 'EM_ANDAMENTO',
          'bg-green-200': status === 'CONCLUIDA'
        }">
          {{ quantidadeTarefas()[status] }} tarefas
        </span>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">

        @for(tarefa of tarefas().filter(x => x.status === status); track $index) {

        <div draggable="true" (dragstart)="onDragStart($event, tarefa)" (dragend)="onDragEnd()"
        class="min-h-32 flex flex-col rounded-xl cursor-grab active:cursor-grabbing
  transition-all duration-200 ease-in-out select-none " [ngClass]="{
    'opacity-70 scale-95 shadow-2xl ring-2 ring-blue-400':
      isDragging,

    'bg-blue-400/20 hover:bg-blue-300/70 hover:shadow-blue-400/50':
      tarefa.status === 'PENDENTE' ,

    'bg-yellow-400/20 hover:bg-yellow-300/70 hover:shadow-yellow-400/50':
      tarefa.status === 'EM_ANDAMENTO' ,

    'bg-green-400/20 hover:bg-green-300/70 hover:shadow-green-400/50':
      tarefa.status === 'CONCLUIDA'
  }">
          <h3 class="font-bold text-base mb-2 px-2 py-1 rounded-t-lg text-white w-full" [ngClass]="{
            'bg-blue-800/50': tarefa.status === 'PENDENTE',
            'bg-yellow-800/50': tarefa.status === 'EM_ANDAMENTO',
            'bg-green-800/50': tarefa.status === 'CONCLUIDA'
          }">
            {{ tarefa.titulo }}
          </h3>
          <p class="text-xs text-black  mx-2">
            {{ tarefa.descricao }}
          </p>

        </div>

        }

      </div>

    </div>
    }

  </form>
</div>
